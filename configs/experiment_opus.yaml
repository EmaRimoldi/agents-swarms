# ─────────────────────────────────────────────────────────────────
#  Swarm Experiment — claude-opus-4-6 (2 agents, 2 h)
# ─────────────────────────────────────────────────────────────────

experiment:
  id: null          # auto-generate timestamp-based ID
  mode: swarm
  runs_dir: runs

# ── Agent settings ────────────────────────────────────────────────
agents:
  n: 2
  model: claude-opus-4-6
  time_budget_minutes: 120
  train_time_budget_seconds: 300
  temperature: null
  cuda_devices: null

  overrides: []

# ── SLURM settings ────────────────────────────────────────────────
slurm:
  partition: pi_tpoggio
  gres: gpu:1
  time: "02:10:00"

# ── Template files ────────────────────────────────────────────────
templates:
  system_prompt: templates/agent_system_prompt.md
  first_message: templates/agent_first_message.md

# ── Swarm settings ────────────────────────────────────────────────
swarm:
  shared_memory_file: shared_memory.jsonl
  sync_interval_seconds: 10
  max_context_entries: 20
